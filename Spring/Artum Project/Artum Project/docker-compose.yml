services:
  mysql:
    image: mysql:8.4
    container_name: opd_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: opd_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - opd_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  opd_mysql_data:

